<div class="d-flex h-100 flex-column gap-4">
  <h1 class="h3 fw-bold ff-text-strong mb-0">Dashboard</h1>

  <div *ngIf="isLoading" class="d-flex flex-grow-1 align-items-center justify-content-center">
    <div class="ff-spinner"></div>
  </div>

  <div *ngIf="!isLoading && hasError" class="d-flex flex-grow-1 flex-column align-items-start gap-3">
    <p class="mb-0 ff-text-muted">
      Ocorreu um erro ao carregar os dados do dashboard.
    </p>
    <button type="button" (click)="retry()" class="btn btn-primary px-3">
      Tentar novamente
    </button>
  </div>

  <div *ngIf="!isLoading && !hasError" class="d-flex flex-column gap-4">
    <div class="row g-3">
      <app-card
        *ngFor="let card of cardData"
        class="col-12 col-lg-4"
        [title]="card.title"
        [amount]="card.amount"
        [valueColor]="card.valueColor"
        [className]="'ff-surface'"
      ></app-card>
    </div>

    <div>
      <h2 class="h5 fw-semibold ff-text-strong mb-3">Últimas transações</h2>
      <app-transactions-table [limit]="3" [showActions]="false"></app-transactions-table>
    </div>
  </div>
</div>

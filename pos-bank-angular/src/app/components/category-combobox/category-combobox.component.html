<div class="position-relative">
  <label [for]="id" class="form-label small fw-semibold ff-text-muted mb-1">Categoria</label>
  <input
    [id]="id"
    type="text"
    required
    [ngModel]="searchText"
    (ngModelChange)="handleInput($event)"
    (focus)="open = true"
    class="form-control"
    placeholder="Busque ou selecione uma categoria"
    autocomplete="off"
  />
  <input type="hidden" [value]="value" />

  <div
    *ngIf="open"
    class="position-absolute top-100 start-0 mt-1 w-100 z-3 overflow-auto bg-white border rounded shadow-sm ff-combobox-menu"
  >
    <button
      *ngFor="let category of filteredCategories"
      type="button"
      (click)="selectCategory(category)"
      class="list-group-item list-group-item-action border-0 rounded-0"
    >
      {{ category.name }}
    </button>
    <p *ngIf="filteredCategories.length === 0" class="px-3 py-2 mb-0 small text-secondary">
      Nenhuma categoria encontrada.
    </p>
  </div>
</div>
